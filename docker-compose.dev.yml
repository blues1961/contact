services:
  db:
    image: postgres:16-alpine
    container_name: con-db-dev
    restart: unless-stopped
    env_file:
      - .env.dev
      - .env.local
    ports:
      - "${DEV_DB_PORT}:5432"
    volumes:
      - con_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: con-backend-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.dev
      - .env.local
    ports:
      - "${DEV_API_PORT}:8000"
    volumes:
      - ./backend:/app
      - con_backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: con-frontend-dev
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env.dev
    ports:
      - "${DEV_VITE_PORT}:${DEV_VITE_PORT}"
    volumes:
      - ./frontend:/app
      - con_frontend_node_modules:/app/node_modules

volumes:
  con_db_data:
  con_backend_node_modules:
  con_frontend_node_modules:

